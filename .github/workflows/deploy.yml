name: Deploy to GitHub Pages (Voilà)

# 把交互式笔记本 双均线策略回测.ipynb 渲染为网页并发布到 GitHub Pages。
# 仓库需包含：双均线策略回测.ipynb、dual_ma_lib.py、export_results.py、以及所有数据 CSV。
# 仓库设置：Settings → Pages → Build and deployment → Source 选 "GitHub Actions"。

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet jupyter voila ipywidgets pandas numpy matplotlib nbformat

      - name: Build Voilà site
        run: |
          mkdir -p _site
          voila "双均线策略回测.ipynb" \
            --OutputDir=_site \
            --exclude-task \
            --no-banner \
            --theme=dark

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
